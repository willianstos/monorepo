# PR Validation Pipeline for 01-monorepo
#
# Canonical CI gate: branch -> PR -> checks green -> human approval -> merge
#
# This workflow runs on every pull_request targeting main.
# It validates lint, type checking, unit tests, and Redis integration tests.
# All jobs must pass before the PR can be merged.
#
# Runner requirement: act_runner in Docker mode.
# See docs/gitea-pr-validation.md for operator setup.

name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv
          python3 -m pip install --upgrade pip --quiet --break-system-packages

      - name: Install dependencies
        run: python3 -m pip install -e .[dev] --quiet --break-system-packages

      - name: Run ruff
        run: python3 -m ruff check workspace projects

  types:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv
          python3 -m pip install --upgrade pip --quiet --break-system-packages

      - name: Install dependencies
        run: python3 -m pip install -e .[dev] --quiet --break-system-packages

      - name: Run mypy
        run: python3 -m mypy workspace

  tests-unit:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv
          python3 -m pip install --upgrade pip --quiet --break-system-packages

      - name: Install dependencies
        run: python3 -m pip install -e .[dev] --quiet --break-system-packages

      - name: Run scheduler and tool unit tests
        run: >-
          python3 -m pytest
          workspace/scheduler/test_orchestration.py
          workspace/tools/test_policies.py
          -q

  tests-integration-redis:
    name: Integration Tests (Redis)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6381:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv
          python3 -m pip install --upgrade pip --quiet --break-system-packages

      - name: Install dependencies
        run: python3 -m pip install -e .[dev] --quiet --break-system-packages

      - name: Run Redis integration tests
        env:
          REDIS_INTEGRATION_HOST: "127.0.0.1"
          REDIS_INTEGRATION_PORT: "6379"
          REDIS_INTEGRATION_DB: "15"
        run: >-
          python3 -m pytest
          workspace/scheduler/test_redis_integration.py
          -q

      - name: Compile-check bootstrap and workspace
        run: python3 -m compileall bootstrap workspace
