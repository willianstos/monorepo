version: 2

working_memory:
  backend: redis
  contents:
    - current_tasks
    - agent_state
    - partial_outputs

session_memory:
  backend: session_store
  retention: recent_hours_or_days
  purpose: maintain_context_continuity

runtime_durable_memory:
  backend: redis_distilled_records
  contents:
    - decisions
    - architecture_constraints
    - project_knowledge
    - distilled_lessons

human_durable_memory:
  backend: checked_in_markdown
  location: .claude/memory
  contents:
    - project
    - architecture
    - lessons

memory_flush:
  required_before_context_discard: true
  allowed_types:
    - learning
    - decision
    - architecture
    - bug
    - improvement
  required_fields:
    - memory_type
    - topic
    - summary
    - confidence
    - tags
  rules:
    - never_store_raw_conversations
    - store_distilled_knowledge_only
    - prefer_short_structured_summaries
    - avoid_duplicates
    - always_attach_tags
    - save_stable_facts_only

retrieval_order:
  - structured_memory
  - recent_sessions
