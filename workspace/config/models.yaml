version: 3

default_provider: codex
default_local_model: qwen3.5:9b

providers:
  local:
    module: workspace.providers.local_provider
    runtime: ollama
    default_model: qwen3.5:9b
    required_env: []
  codex:
    module: workspace.providers.codex_provider
    interface: cli
    required_env: []
  claude:
    module: workspace.providers.claude_provider
    interface: cli
    required_env: []

routing:
  prefer_local_helper_when_safe: true
  escalate_ambiguous_or_sensitive_tasks: true
  local_task_types:
    - classify_request
    - route_small_task
    - summarize_context
    - distill_memory
    - normalize_json
    - extract_structured_fields
    - issue_triage
    - choose_skill_category
    - explain_policy
    - summarize_logs
    - file_inventory_summary
  authoritative_task_types:
    - planning
    - deep_debugging
    - complex_architecture_decision
    - implementation
    - review_analysis
    - research_analysis
    - multi_step_reasoning
  specialization:
    local_helper:
      provider: local
      model: qwen3.5:9b
      role: bounded_low_risk_helper_only
    code_authority:
      provider: codex
      model: codex-cli
      role: implementation_and_repository_edits
    reasoning_authority:
      provider: claude
      model: claude-code
      role: planning_architecture_debugging_and_review

profiles:
  strategic_reasoning:
    primary:
      provider: claude
      model: claude-code
    fallbacks:
      - provider: codex
        model: codex-cli
  implementation:
    primary:
      provider: codex
      model: codex-cli
    fallbacks:
      - provider: claude
        model: claude-code
  testing:
    primary:
      provider: codex
      model: codex-cli
    fallbacks:
      - provider: claude
        model: claude-code
  review:
    primary:
      provider: claude
      model: claude-code
    fallbacks:
      - provider: codex
        model: codex-cli
  helper:
    primary:
      provider: local
      model: qwen3.5:9b
    fallbacks:
      - provider: claude
        model: claude-code
