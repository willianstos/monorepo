args = ["-y", "@upstash/context7-mcp@2.1.2"]

[servers.context7.surfaces.project_mcp]
command = "npx"
args = ["-y", "@upstash/context7-mcp@2.1.2"]

[servers.tavily]
package = "tavily-mcp@0.2.17"
