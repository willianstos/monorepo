[servers."future-agents-local"]
package = "workspace.mcp.server"
startup_timeout_sec = 120

[servers."future-agents-local".surfaces.codex_wsl]
command = "bash"
args = ["--noprofile", "--norc", "-lc", "cd {{repo_root_wsl}} && exec bash bootstrap/mcp-launch-future-agents.sh"]
env = { PYTHONUNBUFFERED = "1" }

[servers."future-agents-local".surfaces.codex_windows_toml]
command = "wsl.exe"
args = ["-d", "{{wsl_distro}}", "bash", "--noprofile", "--norc", "-lc", "cd {{repo_root_wsl}} && exec bash bootstrap/mcp-launch-future-agents.sh"]
env = { PYTHONUNBUFFERED = "1" }

[servers."future-agents-local".surfaces.codex_windows_json]
command = "wsl.exe"
args = ["-d", "{{wsl_distro}}", "bash", "--noprofile", "--norc", "-lc", "cd {{repo_root_wsl}} && exec bash bootstrap/mcp-launch-future-agents.sh"]
env = { PYTHONUNBUFFERED = "1" }

[servers."future-agents-local".surfaces.claude_desktop]
command = "wsl.exe"
args = ["-d", "{{wsl_distro}}", "bash", "--noprofile", "--norc", "-lc", "cd {{repo_root_wsl}} && exec bash bootstrap/mcp-launch-future-agents.sh"]
env = { PYTHONUNBUFFERED = "1" }

[servers."future-agents-local".surfaces.project_mcp]
command = "bash"
args = ["--noprofile", "--norc", "-lc", "cd {{repo_root_wsl}} && exec bash bootstrap/mcp-launch-future-agents.sh"]
env = { PYTHONUNBUFFERED = "1" }

[servers.docker]
