startup_timeout_sec = 40

[servers.docker.surfaces.codex_wsl]
command = "bash"
args = ["--noprofile", "--norc", "-lc", "cd {{repo_root_wsl}} && exec bash bootstrap/mcp-launch-docker.sh"]
env = { DOCKER_HOST = "unix:///var/run/docker.sock" }

[servers.docker.surfaces.codex_windows_toml]
