[servers."ai-context"]
package = "@ai-coders/context@0.7.1"
startup_timeout_sec = 30

[servers."ai-context".surfaces.codex_wsl]
command = "npx"
args = ["--yes", "@ai-coders/context@0.7.1", "mcp"]

[servers."ai-context".surfaces.codex_windows_toml]
