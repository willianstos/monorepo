[metadata]
version = 1
default_profile = "factory"

[paths]
repo_root_wsl = "/mnt/c/Users/Zappro/repos/01-monorepo"
repo_root_windows = "C:\\Users\\Zappro\\repos\\01-monorepo"
projects_base_wsl = "/mnt/c/Users/Zappro/repos"
projects_base_windows = "C:\\Users\\Zappro\\repos"
codex_include_wsl = "/mnt/c/Users/Zappro/repos/codex-mcp-server/.mcp"
codex_include_windows = "C:\\Users\\Zappro\\repos\\codex-mcp-server\\.mcp"
filesystem_root_wsl = "/mnt/c/Users/Zappro/repos/codex-mcp-server"
filesystem_root_windows = "C:\\Users\\Zappro\\repos\\codex-mcp-server"
wsl_distro = "Ubuntu-24.04"
wsl_user = "will"

[codex]
personality = "pragmatic"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
hide_full_access_warning = true

[codex.model_migrations]
gpt-5-codex = "gpt-5.3-codex"

[codex.model_availability_nux]
"gpt-5.3-codex-spark" = 4

[codex.trusted_projects.wsl]
paths = [
  "/mnt/c/Users/Zappro/repos/01-monorepo",
  "/mnt/c/Users/Zappro/repos",
  "/mnt/c/Users/Zappro",
]

[codex.trusted_projects.windows]
paths = [
  "C:\\Users\\Zappro\\repos\\01-monorepo",
  "C:\\Users\\Zappro\\repos",
  "C:\\Users\\Zappro",
]

[profiles.platform]
servers = ["future-agents-local", "docker", "git", "fetch", "redis"]

[profiles.factory]
servers = [
  "future-agents-local",
  "docker",
  "git",
  "fetch",
  "redis",
  "filesystem",
  "context7",
  "tavily",
  "TestSprite",
  "chrome-devtools",
  "ai-context",
]

[profiles.project]
servers = [
  "future-agents-local",
  "docker",
  "filesystem",
  "context7",
  "tavily",
  "TestSprite",
  "chrome-devtools",
  "ai-context",
]

[targets.codex_wsl]
format = "codex_toml"
profile = "factory"
output = "bootstrap/templates/codex-wsl-managed.toml"

[targets.codex_windows_toml]
format = "codex_toml"
profile = "factory"
output = "bootstrap/templates/codex-windows-managed.toml"

[targets.codex_windows_json]
format = "json_mcp"
profile = "factory"
output = "bootstrap/templates/codex-windows-managed.json"

[targets.claude_desktop]
format = "json_mcp"
profile = "factory"
output = "bootstrap/templates/claude-desktop-managed.json"

[targets.project_mcp]
format = "json_mcp"
profile = "project"
output = "bootstrap/templates/project-managed.mcp.json"

[servers.git]
package = "@cyanheads/git-mcp-server@2.10.0"
startup_timeout_sec = 30

[servers.git.surfaces.codex_wsl]
command = "npx"
args = ["-y", "@cyanheads/git-mcp-server@2.10.0"]

[servers.git.surfaces.codex_windows_toml]
command = "npx"
args = ["-y", "@cyanheads/git-mcp-server@2.10.0"]

[servers.git.surfaces.codex_windows_json]
command = "npx"
args = ["-y", "@cyanheads/git-mcp-server@2.10.0"]

[servers.git.surfaces.claude_desktop]
command = "npx"
args = ["-y", "@cyanheads/git-mcp-server@2.10.0"]

[servers.filesystem]
package = "@modelcontextprotocol/server-filesystem@2026.1.14"
startup_timeout_sec = 30

[servers.filesystem.surfaces.codex_wsl]
command = "npx"
args = [
  "-y",
  "@modelcontextprotocol/server-filesystem@2026.1.14",
  "{{filesystem_root_wsl}}",
  "{{projects_base_wsl}}",
]

[servers.filesystem.surfaces.codex_windows_toml]
command = "npx"
args = [
  "-y",
  "@modelcontextprotocol/server-filesystem@2026.1.14",
  "{{filesystem_root_windows}}",
  "{{projects_base_windows}}",
]

[servers.filesystem.surfaces.codex_windows_json]
command = "npx"
args = [
  "-y",
  "@modelcontextprotocol/server-filesystem@2026.1.14",
  "{{filesystem_root_windows}}",
  "{{projects_base_windows}}",
]

[servers.filesystem.surfaces.claude_desktop]
command = "npx"
args = [
  "-y",
  "@modelcontextprotocol/server-filesystem@2026.1.14",
  "{{filesystem_root_windows}}",
  "{{projects_base_windows}}",
]

[servers.filesystem.surfaces.project_mcp]
command = "npx"
args = [
  "-y",
  "@modelcontextprotocol/server-filesystem@2026.1.14",
  "{{project_root}}",
]

[servers.context7]
package = "@upstash/context7-mcp@2.1.2"
startup_timeout_sec = 30
template_note = "Provide CONTEXT7_API_KEY via env/.env, secret overlay, or process environment."
secret_env_candidates = { CONTEXT7_API_KEY = ["CONTEXT7_API_KEY"] }

[servers.context7.surfaces.codex_wsl]
command = "npx"
args = ["-y", "@upstash/context7-mcp@2.1.2"]

[servers.context7.surfaces.codex_windows_toml]
