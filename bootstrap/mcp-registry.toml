[servers."chrome-devtools"]
package = "chrome-devtools-mcp@0.19.0"
startup_timeout_sec = 20

[servers."chrome-devtools".surfaces.codex_wsl]
command = "npx"
args = ["-y", "chrome-devtools-mcp@0.19.0"]

[servers."chrome-devtools".surfaces.codex_windows_toml]
