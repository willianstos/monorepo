services:
  redis-integration:
    image: redis:7.4-alpine
    container_name: redis-integration
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-hostnet:
    image: redis:7.4-alpine
    container_name: redis-hostnet
    network_mode: host
    command: ["redis-server", "--appendonly", "yes", "--port", "6380", "--bind", "127.0.0.1"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
